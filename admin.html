<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF9FF3" />

    <title>Slide-o-Matic Editor</title>
    <meta
      name="description"
      content="Admin editor for Slide-o-Matic presentations. Edit and manage your slides with a powerful JSON-based interface."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://slideomatic.app/admin.html" />
    <meta property="og:title" content="Slide-o-Matic Editor" />
    <meta property="og:description" content="Admin editor for managing Slide-o-Matic presentations" />
    <meta property="og:image" content="https://slideomatic.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://slideomatic.app/admin.html" />
    <meta property="twitter:title" content="Slide-o-Matic Editor" />
    <meta property="twitter:description" content="Admin editor for managing Slide-o-Matic presentations" />
    <meta property="twitter:image" content="https://slideomatic.app/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header class="toolbar">
      <h1>Slide-o-Matic Editor</h1>
      <div class="toolbar__actions">
        <button id="reload-button" type="button">Reload Slides</button>
        <button id="download-button" type="button">Download slides.json</button>
      </div>
    </header>

    <div id="auth-screen" class="auth-screen" aria-hidden="true" hidden>
      <form id="auth-form" class="auth-card">
        <h2>Admin Access</h2>
        <p>Enter the password to edit this deck.</p>
        <label for="auth-password">Password</label>
        <input id="auth-password" type="password" autocomplete="current-password" required />
        <p id="auth-error" class="auth-error" role="alert"></p>
        <button type="submit">Unlock Editor</button>
      </form>
    </div>

    <main id="editor" class="editor" aria-live="polite"></main>

    <template id="message-template">
      <section class="message" role="alert">
        <h2></h2>
        <p></p>
      </section>
    </template>

    <script type="module" src="admin.js"></script>
  </body>
</html>
